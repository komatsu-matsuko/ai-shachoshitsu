<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <title>AI社長室｜図解HTMLを開く</title>
    <style>
      :root{
        --bg0:#070A12; --bg1:#0B1020;
        --txt:#eaf0ff; --muted:#aeb9dd; --muted2:#7d89b3;
        --accent:#7c5cff; --accent2:#00d4ff; --accent3:#ff4fd8;
        --shadow: 0 16px 60px rgba(0,0,0,.55);
        --radius: 18px;
        --sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Yu Gothic", "Meiryo", "Segoe UI", Roboto, Arial, sans-serif;
      }
      *{ box-sizing:border-box; }
      body{
        margin:0; font-family:var(--sans); color:var(--txt);
        background:
          radial-gradient(1000px 700px at 20% 10%, rgba(124,92,255,.35), transparent 60%),
          radial-gradient(900px 700px at 85% 20%, rgba(0,212,255,.22), transparent 60%),
          radial-gradient(900px 700px at 75% 85%, rgba(255,79,216,.18), transparent 60%),
          linear-gradient(180deg, var(--bg0), var(--bg1));
        min-height:100vh;
        display:grid;
        place-items:center;
        padding: 18px;
      }
      .card{
        width:min(780px, 100%);
        border-radius: 22px;
        padding: 18px 18px 16px;
        background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
        border: 1px solid rgba(185,199,255,.16);
        box-shadow: var(--shadow);
      }
      h1{ margin:0 0 8px; font-size: 18px; }
      p{ margin:0 0 14px; color:var(--muted); line-height:1.6; }
      .grid{ display:grid; grid-template-columns: 1fr 1fr; gap: 12px; }
      a.btn{
        display:block;
        border-radius: var(--radius);
        padding: 14px 14px 12px;
        text-decoration:none;
        color:var(--txt);
        border: 1px solid rgba(255,255,255,.12);
        background: rgba(10,14,28,.40);
        transition: transform .08s ease, border-color .08s ease, background .08s ease;
      }
      a.btn:hover{ transform: translateY(-1px); border-color: rgba(185,199,255,.35); background: rgba(10,14,28,.50); }
      .t{ font-weight: 800; letter-spacing:.01em; }
      .d{ margin-top: 6px; color: var(--muted2); font-size: 12.5px; line-height: 1.5; }
      .hint{
        margin-top: 12px;
        color: var(--muted2);
        font-size: 12.5px;
        line-height:1.6;
      }
      code{
        padding: 2px 6px;
        border-radius: 10px;
        border:1px solid rgba(255,255,255,.12);
        background: rgba(0,0,0,.22);
      }
      @media (max-width:720px){ .grid{ grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>AI社長室｜幹部共有 図解HTML</h1>
      <p>下のボタンをクリックすると、ブラウザで開きます。</p>

      <div class="grid">
        <a class="btn" href="./executive-briefing-print.html">
          <div class="t">印刷1枚版（A4）</div>
          <div class="d">配布・会議用。白背景で情報密度高め。</div>
        </a>
        <a class="btn" href="./executive-briefing-mobile.html">
          <div class="t">スマホ最適化版</div>
          <div class="d">カード＋折りたたみ。共有・閲覧用。</div>
        </a>
      </div>

      <div class="hint">
        うまく開けない場合は、Finder で <code>docs/open-briefings.html</code> をダブルクリックで開いてください。
      </div>
    </main>
  </body>
</html>
